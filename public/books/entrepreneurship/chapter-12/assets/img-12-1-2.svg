<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .title { font-weight: 700; font-size: 16px; fill: #ffffff; }
      .label { font-weight: 600; font-size: 13px; fill: #1e293b; }
      .sub-label { font-weight: 400; font-size: 11px; fill: #64748b; }
      .connector { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 4 4; }
    </style>
    <!-- Gradients -->
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <!-- Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <dropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <filter id="centerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <dropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Connectors -->
  <line x1="400" y1="250" x2="400" y2="90" class="connector" />
  <line x1="400" y1="250" x2="640" y2="170" class="connector" />
  <line x1="400" y1="250" x2="580" y2="390" class="connector" />
  <line x1="400" y1="250" x2="220" y2="390" class="connector" />
  <line x1="400" y1="250" x2="160" y2="170" class="connector" />

  <!-- Outer Node 1: SBA (Top) -->
  <g filter="url(#shadow)">
    <rect x="250" y="40" width="300" height="60" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="400" y="62" class="label">Hiệp hội Doanh nghiệp nhỏ</text>
    <text x="400" y="82" class="sub-label">Small Business Administration (SBA)</text>
  </g>

  <!-- Outer Node 2: SBDC (Top Right) -->
  <g filter="url(#shadow)">
    <rect x="500" y="140" width="280" height="60" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="640" y="162" class="label">Trung tâm Phát triển DN nhỏ</text>
    <text x="640" y="182" class="sub-label">Small Business Development Center (SBDC)</text>
  </g>

  <!-- Outer Node 3: SCORE (Bottom Right) -->
  <g filter="url(#shadow)">
    <rect x="440" y="360" width="280" height="60" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="580" y="382" class="label">Hiệp hội Cố vấn Doanh nghiệp</text>
    <text x="580" y="402" class="sub-label">Service Corps of Retired Executives (SCORE)</text>
  </g>

  <!-- Outer Node 4: VBOC (Bottom Left) -->
  <g filter="url(#shadow)">
    <rect x="80" y="360" width="280" height="60" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="220" y="382" class="label">Trung tâm Hỗ trợ DN Cựu chiến binh</text>
    <text x="220" y="402" class="sub-label">Veterans Business Outreach Center (VBOC)</text>
  </g>

  <!-- Outer Node 5: WBC (Top Left) -->
  <g filter="url(#shadow)">
    <rect x="20" y="140" width="280" height="60" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="160" y="162" class="label">Trung tâm Doanh nghiệp Phụ nữ</text>
    <text x="160" y="182" class="sub-label">Women’s Business Center (WBC)</text>
  </g>

  <!-- Center Node: Government-Related Agencies -->
  <g filter="url(#centerShadow)">
    <rect x="250" y="210" width="300" height="80" rx="20" fill="url(#centerGrad)" />
    <text x="400" y="240" class="title">Các cơ quan liên quan</text>
    <text x="400" y="262" class="title">đến Chính phủ</text>
  </g>
</svg>
